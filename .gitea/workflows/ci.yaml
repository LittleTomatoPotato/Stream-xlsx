name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-rust:
    runs-on: fc-ci
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo test
        run: cargo test --workspace

  build-cli:
    runs-on: fc-ci
    needs: test-rust
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI (release)
        run: cargo build --release

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v3
        with:
          name: project_x-cli-${{ runner.os }}
          path: target/release/project_x

  build-wheel:
    runs-on: fc-ci
    needs: test-rust
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Python wheel (release)
        run: |
          cd stream_xlsx_py
          maturin build --release

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v3
        with:
          name: stream_xlsx_py-wheel-${{ runner.os }}
          path: target/wheels/*.whl
