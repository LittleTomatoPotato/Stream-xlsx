  build-wheel:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: manylinux2014
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: manylinux2014
            suffix: linux-arm64
          - os: windows-latest
            target: x86_64
            suffix: windows-amd64
          - os: windows-11-arm
            target: aarch64
            suffix: windows-arm64
          - os: macos-15-intel
            target: x86_64
            suffix: macos-amd64
          - os: macos-latest
            target: aarch64
            suffix: macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup build environment (ARM64 Windows)
        if: matrix.os == 'windows-11-arm'
        shell: powershell
        run: |
          Write-Output "> Setup bash.exe (git-for-windows/PortableGit)"
          Invoke-WebRequest "https://github.com/git-for-windows/git/releases/download/v2.53.0.windows.2/PortableGit-2.53.0.2-arm64.7z.exe" -OutFile C:\git.7z.exe
          C:\git.7z.exe -oC:\git -y

          Write-Output "> Setup Rust"
          Invoke-WebRequest "https://static.rust-lang.org/rustup/dist/aarch64-pc-windows-msvc/rustup-init.exe" -OutFile C:\rustup-init.exe
          C:\rustup-init.exe --default-host aarch64-pc-windows-msvc -y

          Write-Output "> Setup VS Build Tools"
          Invoke-WebRequest "https://aka.ms/vs/17/release/vs_BuildTools.exe" -OutFile C:\vs_BuildTools.exe
          Start-Process C:\vs_BuildTools.exe -ArgumentList " `
              --add Microsoft.VisualStudio.Workload.VCTools `
              --add Microsoft.VisualStudio.Component.VC.Tools.arm64 `
              --includeRecommended --quiet --norestart --wait" -Wait

          Write-Output "> Update GITHUB_PATH"
          [System.IO.File]::AppendAllText($Env:GITHUB_PATH, "`n" + "C:\git\bin\")
          [System.IO.File]::AppendAllText($Env:GITHUB_PATH, "`n" + $Env:USERPROFILE + "\.cargo\bin\")
          [System.IO.File]::AppendAllText($Env:GITHUB_PATH, "`n")

      - name: Set up Python (ARM64 Windows)
        if: matrix.os == 'windows-11-arm'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: stream_xlsx_py

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.suffix }}
          path: stream_xlsx_py/target/wheels/*.whl

  release:
    if: github.event_name == 'push' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    needs: [build-cli, build-wheel]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push' && startsWith(github.ref_name, 'v') && github.event.base_ref == 'refs/heads/main'
    needs: [build-wheel]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/stream-xlsx
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
          pattern: wheel-*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
