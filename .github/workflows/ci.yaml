name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-amd64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            suffix: windows-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            suffix: macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sxlsx dist/sxlsx-${{ matrix.suffix }}
          chmod +x dist/sxlsx-${{ matrix.suffix }}

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/sxlsx.exe" "dist/sxlsx-${{ matrix.suffix }}.exe"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: sxlsx-cli-${{ matrix.suffix }}
          path: dist/*

  build-wheel:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: manylinux2014
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64
            manylinux: manylinux2014
            suffix: linux-arm64
          - os: windows-latest
            target: x86_64
            suffix: windows-amd64
          - os: macos-15-intel
            target: x86_64
            suffix: macos-amd64
          - os: macos-latest
            target: aarch64
            suffix: macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: stream_xlsx_py

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.suffix }}
          path: stream_xlsx_py/target/wheels/*.whl

